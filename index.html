<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Ramalan Spiritual Pro</title>
    <style>
        :root {
            --primary-dark: #0f0c29;
            --purple-neon: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --accent: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            background: var(--primary-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Dekorasi Garis Ungu */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(168, 85, 247, 0.03) 1px, rgba(168, 85, 247, 0.03) 2px);
            pointer-events: none;
            z-index: 0;
        }

        .container { 
            width: 100%;
            max-width: 480px; 
            margin: 20px; 
            padding: 30px; 
            background: rgba(15, 12, 41, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px var(--purple-glow);
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center; 
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--purple-glow));
        }

        .tabs {
            display: flex; 
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent;
            color: #94a3b8; font-weight: 600; cursor: pointer;
            transition: 0.3s; border-radius: 12px;
        }

        .tab-btn.active { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 4px 15px var(--purple-glow);
        }

        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .quick-dates {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 20px;
        }

        .date-btn {
            padding: 10px 5px; border: 1px solid rgba(168, 85, 247, 0.2); 
            border-radius: 10px; background: var(--glass);
            color: #cbd5e1; font-size: 12px; cursor: pointer; transition: 0.3s;
        }

        .date-btn:hover { background: rgba(168, 85, 247, 0.2); border-color: var(--purple-neon); }

        input {
            width: 100%; padding: 15px; border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px; background: rgba(0, 0, 0, 0.3);
            color: white; font-size: 16px; margin-bottom: 15px;
            text-align: center;
        }

        input:focus { outline: none; border-color: var(--purple-neon); box-shadow: 0 0 15px var(--purple-glow); }

        .ramal-btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: var(--accent); color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }

        .ramal-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px var(--purple-glow); }

        .result {
            margin-top: 25px; padding: 20px; border-radius: 20px; text-align: center;
            background: linear-gradient(to bottom, rgba(168, 85, 247, 0.1), transparent);
            border: 1px dashed rgba(168, 85, 247, 0.3);
            min-height: 100px;
        }

        .emoji { font-size: 50px; filter: drop-shadow(0 0 10px gold); margin-bottom: 10px; }
        .khodam-name { font-size: 22px; font-weight: 800; color: #facc15; }
        .match { font-size: 24px; font-weight: bold; color: #4ade80; margin-top: 10px;}

        .footer {
            text-align: center; margin-top: 30px; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05); font-size: 13px;
        }
        
        .loading-text { animation: pulse 1.5s infinite; color: var(--purple-neon); }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 RAMALAN GAIB</h1>
            <p style="font-size: 12px; opacity: 0.6; margin-top: 5px;">Menyingkap tabir takdir di balik angka</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" id="btn-khodam" onclick="switchTab('khodam')">🛡️ KHODAM</button>
            <button class="tab-btn" id="btn-jodoh" onclick="switchTab('jodoh')">💞 JODOH</button>
        </div>

        <div id="khodamTab" class="tab-content active">
            <div class="quick-dates">
                <button class="date-btn" onclick="setDate('khodam', '12/04/1997')">12/04/97</button>
                <button class="date-btn" onclick="setDate('khodam', '01/01/2000')">01/01/00</button>
                <button class="date-btn" onclick="setDate('khodam', '22/11/1999')">22/11/99</button>
            </div>
            <input type="text" id="birthdate" placeholder="DD/MM/YYYY">
            <button class="ramal-btn" onclick="cekKhodam()">CARI KHODAM</button>
            <div id="result" class="result">Hasil akan muncul di sini...</div>
        </div>

        <div id="jodohTab" class="tab-content">
            <div class="quick-dates">
                <button class="date-btn" onclick="setDate('jodoh', '15/08/1998')">15/08/98</button>
                <button class="date-btn" onclick="setDate('jodoh', '30/06/1996')">30/06/96</button>
                <button class="date-btn" onclick="setDate('jodoh', '25/12/1995')">25/12/95</button>
            </div>
            <input type="text" id="jodohDate" placeholder="DD/MM/YYYY">
            <button class="ramal-btn" onclick="cekJodoh()">INTIP JODOH</button>
            <div id="jodohResult" class="result">Siapa pasangan jiwamu?</div>
        </div>

        <div class="footer">
            <div style="color: #a855f7; font-weight: bold; letter-spacing: 2px;">IMAN FIRMAN</div>
            <div style="opacity: 0.5;">Digital Spiritualist • Jakarta</div>
        </div>
    </div>

    <script>
        const khodamList = [
            { nama: "Harimau Putih Siliwangi", emoji: "🐅", desc: "Wibawa tingkat tinggi" },
            { nama: "Naga Langit Ungu", emoji: "🐲", desc: "Pembawa keberuntungan" },
            { nama: "Buaya Putih Gaib", emoji: "🐊", desc: "Kesetiaan tiada tara" },
            { nama: "Kucing Hitam Mistis", emoji: "🐈‍⬛", desc: "Intuisi yang tajam" },
            { nama: "Garuda Emas", emoji: "🦅", desc: "Visi masa depan cerah" }
        ];

        const jodohList = [
            { nama: "Seseorang dari Masa Lalu", emoji: "🕰️", match: "98%" },
            { nama: "Pengusaha Sukses", emoji: "💼", match: "85%" },
            { nama: "Seniman Kreatif", emoji: "🎨", match: "92%" },
            { nama: "Teman Dekat Sendiri", emoji: "☕", match: "95%" }
        ];

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function setDate(tab, date) {
            if (tab === 'khodam') document.getElementById('birthdate').value = date;
            else document.getElementById('jodohDate').value = date;
        }

        function cekKhodam() {
            const input = document.getElementById('birthdate').value;
            const res = document.getElementById('result');
            if(!input.includes('/')) return res.innerHTML = "Format salah!";
            
            res.innerHTML = '<div class="loading-text">Meditasi dengan leluhur...</div>';
            setTimeout(() => {
                const rand = Math.floor(Math.random() * khodamList.length);
                const k = khodamList[rand];
                res.innerHTML = `<div class="emoji">${k.emoji}</div><div class="khodam-name">${k.nama}</div><div style="font-size:14px; opacity:0.7">${k.desc}</div>`;
            }, 1500);
        }

        function cekJodoh() {
            const input = document.getElementById('jodohDate').value;
            const res = document.getElementById('jodohResult');
            if(!input.includes('/')) return res.innerHTML = "Format salah!";

            res.innerHTML = '<div class="loading-text">Membaca garis takdir...</div>';
            setTimeout(() => {
                const rand = Math.floor(Math.random() * jodohList.length);
                const j = jodohList[rand];
                res.innerHTML = `<div class="emoji">${j.emoji}</div><div class="khodam-name">${j.nama}</div><div class="match">Match: ${j.match}</div>`;
            }, 1500);
        }
    </script>
</body>
</html>
