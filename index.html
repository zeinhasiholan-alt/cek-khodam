<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Ramalan Spiritual - Iman Firman</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0f0c29;
            --purple-neon: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --accent: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--primary-dark);
            /* Efek gradasi radial di latar belakang */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Dekorasi Garis-garis Ungu (Scanlines) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(168, 85, 247, 0.05) 1px, rgba(168, 85, 247, 0.05) 2px);
            pointer-events: none;
            z-index: 0;
        }

        .container { 
            width: 100%;
            max-width: 450px; 
            margin: 20px; 
            padding: 35px; 
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 30px var(--purple-glow);
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center; 
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px var(--purple-glow));
        }

        .tabs {
            display: flex; 
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px;
            border-radius: 18px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent;
            color: #94a3b8; font-weight: 600; cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 14px;
        }

        .tab-btn.active { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 4px 15px var(--purple-glow);
        }

        .tab-content { display: none; animation: slideUp 0.5s ease forwards; }
        .tab-content.active { display: block; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .quick-dates {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 20px;
        }

        .date-btn {
            padding: 10px 5px; border: 1px solid rgba(168, 85, 247, 0.2); 
            border-radius: 12px; background: var(--glass);
            color: #cbd5e1; font-size: 11px; cursor: pointer; transition: 0.3s;
        }

        .date-btn:hover { 
            background: rgba(168, 85, 247, 0.2); 
            border-color: var(--purple-neon);
            transform: translateY(-2px);
        }

        input {
            width: 100%; padding: 15px; border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 15px; background: rgba(0, 0, 0, 0.3);
            color: white; font-size: 16px; margin-bottom: 15px;
            text-align: center; transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--purple-neon); box-shadow: 0 0 15px var(--purple-glow); }

        .ramal-btn {
            width: 100%; padding: 16px; border: none; border-radius: 15px;
            background: var(--accent); color: white; font-size: 16px; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }

        .ramal-btn:hover { 
            transform: scale(1.02); 
            box-shadow: 0 15px 30px var(--purple-glow); 
        }

        .result {
            margin-top: 25px; padding: 25px; border-radius: 20px; text-align: center;
            background: linear-gradient(to bottom, rgba(168, 85, 247, 0.1), transparent);
            border: 1px dashed rgba(168, 85, 247, 0.3);
            min-height: 120px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .emoji { font-size: 55px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .user-pic { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--purple-neon); margin-bottom: 10px; box-shadow: 0 0 15px var(--purple-glow); }
        .khodam-name { font-size: 20px; font-weight: 800; color: #facc15; text-transform: uppercase; }
        .advice-text { font-style: italic; font-size: 13px; margin-top: 10px; color: #a5b4fc; line-height: 1.5; }
        .match { font-size: 24px; font-weight: bold; color: #4ade80; margin-top: 10px; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }

        .footer {
            text-align: center; margin-top: 35px; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .footer b { color: var(--purple-neon); letter-spacing: 2px; }

        .loading-text { 
            animation: blink 1s infinite; 
            color: var(--purple-neon); 
            font-weight: 600;
            font-size: 14px;
        }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        @media (max-width: 400px) {
            .container { padding: 20px; }
            .quick-dates { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 PORTAL GAIB</h1>
            <p style="font-size: 11px; opacity: 0.5; margin-top: 8px; letter-spacing: 1px;">SINKRONISASI ALAM SEMESTA</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" id="btn-khodam" onclick="switchTab('khodam')">CEK KHODAM</button>
            <button class="tab-btn" id="btn-jodoh" onclick="switchTab('jodoh')">RAMAL JODOH</button>
        </div>

        <div id="khodamTab" class="tab-content active">
            <div class="quick-dates">
                <button class="date-btn" onclick="setDate('khodam', '12/04/1997')">12/04/97</button>
                <button class="date-btn" onclick="setDate('khodam', '01/01/2000')">01/01/00</button>
                <button class="date-btn" onclick="setDate('khodam', '22/11/1999')">22/11/99</button>
            </div>
            <input type="text" id="birthdate" placeholder="Contoh: 12/04/1997">
            <button class="ramal-btn" onclick="cekKhodam()">PANGGIL KHODAM</button>
            <div id="result" class="result">
                <p style="opacity: 0.4; font-size: 13px;">Masukkan tanggal lahir untuk memanggil pelindung gaibmu</p>
            </div>
        </div>

        <div id="jodohTab" class="tab-content">
            <div class="quick-dates">
                <button class="date-btn" onclick="setDate('jodoh', '15/08/1998')">15/08/98</button>
                <button class="date-btn" onclick="setDate('jodoh', '30/06/1996')">30/06/96</button>
                <button class="date-btn" onclick="setDate('jodoh', '25/12/1995')">25/12/95</button>
            </div>
            <input type="text" id="jodohDate" placeholder="Contoh: 15/08/1998">
            <button class="ramal-btn" onclick="cekJodoh()">TERAWANG JODOH</button>
            <div id="jodohResult" class="result">
                <p style="opacity: 0.4; font-size: 13px;">Siapa frekuensi yang cocok dengan jiwamu?</p>
            </div>
        </div>

        <div class="footer">
            <p style="font-size: 10px; opacity: 0.4; margin-bottom: 5px;">DEVELOPED BY</p>
            <b>IMAN FIRMAN</b>
            <p style="font-size: 11px; opacity: 0.5; margin-top: 5px;">Jakarta • Digital Shaman v2.0</p>
        </div>
    </div>

    <script>
        // List Khodam Lokal untuk kombinasi API
        const localKhodams = [
            { n: "Harimau Putih Siliwangi", e: "🐅" },
            { n: "Naga Langit Vercel", e: "🐲" },
            { n: "Ksatria Coding Malam", e: "⚔️" },
            { n: "Ratu Pantai Selatan", e: "🧜‍♀️" },
            { n: "Gajah Mada Purba", e: "🐘" },
            { n: "Elang Emas Cyber", e: "🦅" }
        ];

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function setDate(tab, date) {
            if (tab === 'khodam') document.getElementById('birthdate').value = date;
            else document.getElementById('jodohDate').value = date;
        }

        // FUNGSI CEK KHODAM (Panggil API Nasihat)
        async function cekKhodam() {
            const input = document.getElementById('birthdate').value;
            const res = document.getElementById('result');
            
            if(!input.includes('/') || input.length < 8) {
                res.innerHTML = "<span style='color:#ef4444'>Format salah (DD/MM/YYYY)</span>";
                return;
            }
            
            res.innerHTML = '<div class="loading-text">MENGHUBUNGI DIMENSI API...</div>';
            
            try {
                // Fetch nasihat acak sebagai "pesan khodam"
                const response = await fetch('https://api.adviceslip.com/advice');
                const data = await response.json();
                const advice = data.slip.advice;

                const randomK = localKhodams[Math.floor(Math.random() * localKhodams.length)];

                setTimeout(() => {
                    res.innerHTML = `
                        <div class="emoji">${randomK.e}</div>
                        <div class="khodam-name">${randomK.n}</div>
                        <div class="advice-text">"${advice}"</div>
                    `;
                }, 1000);
            } catch (error) {
                res.innerHTML = "Gagal menembus portal gaib.";
            }
        }

        // FUNGSI CEK JODOH (Panggil API Random User)
        async function cekJodoh() {
            const input = document.getElementById('jodohDate').value;
            const res = document.getElementById('jodohResult');
            
            if(!input.includes('/') || input.length < 8) {
                res.innerHTML = "<span style='color:#ef4444'>Format salah (DD/MM/YYYY)</span>";
                return;
            }

            res.innerHTML = '<div class="loading-text">MEMINDAI GARIS TAKDIR...</div>';

            try {
                // Fetch orang acak sebagai ramalan jodoh
                const response = await fetch('https://randomuser.me/api/');
                const data = await response.json();
                const user = data.results[0];

                setTimeout(() => {
                    res.innerHTML = `
                        <img src="${user.picture.large}" class="user-pic">
                        <div class="khodam-name">${user.name.first} ${user.name.last}</div>
                        <div style="font-size:12px; opacity:0.7">${user.location.city}, ${user.location.country}</div>
                        <div class="match">MATCH: ${Math.floor(Math.random() * 20) + 80}%</div>
                    `;
                }, 1000);
            } catch (error) {
                res.innerHTML = "Frekuensi cinta terganggu.";
            }
        }
    </script>
</body>
</html>
